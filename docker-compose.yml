services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: assistax
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/assistax
    volumes:
      - .:/app

volumes:
  pgdata:
